services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: music_corn
      POSTGRES_PASSWORD: music_corn
      POSTGRES_DB: music_corn
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_corn"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://music_corn:music_corn@db:5432/music_corn
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    volumes:
      - podcast_output:/app/output

volumes:
  pgdata:
  podcast_output:
